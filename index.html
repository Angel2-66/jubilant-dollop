<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama Numérico - 54 Piezas (2 Jugadores)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 20px;
        }

        /* Marcador y Controles */
        .scoreboard {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: #34495e;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player {
            padding: 10px 20px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .active-player {
            background-color: #e67e22;
            transform: scale(1.1);
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }

        /* Tablero */
        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 100px);
            gap: 12px;
            padding: 20px;
            background: #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card {
            width: 100px;
            height: 130px;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ecf0f1;
        }

        .card-back {
            background: linear-gradient(45deg, #2980b9, #3498db);
            font-size: 32px;
            font-weight: bold;
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
        }

        .matched {
            visibility: hidden; /* Opcional: oculta las cartas ya encontradas */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Memorama de 54 Piezas</h1>
    
    <div class="scoreboard">
        <div id="p1-display" class="player active-player">Jugador 1: <span id="score1">0</span></div>
        <div id="p2-display" class="player">Jugador 2: <span id="score2">0</span></div>
        <button onclick="resetGame()">Reiniciar Juego</button>
    </div>
    
    <div class="game-board" id="board"></div>

    <script>
        const totalParejas = 27;
        const inicioNumero = 79800;
        const extension = ".jpg";
        const carpeta = "Drae/";

        let flippedCards = [];
        let matchedCount = 0;
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let canClick = true;

        // Generar lista de imágenes
        let imageSources = [];
        for (let i = 0; i < totalParejas; i++) {
            imageSources.push(`${carpeta}${inicioNumero + i}${extension}`);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = ''; // Limpiar tablero
            const gameIcons = [...imageSources, ...imageSources];
            const shuffledIcons = shuffle(gameIcons);

            shuffledIcons.forEach((iconPath) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = iconPath;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front">
                            <img src="${iconPath}" alt="Imagen">
                        </div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (!canClick) return;
            if (this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                canClick = false;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;

            if (card1.dataset.icon === card2.dataset.icon) {
                // Acierto
                scores[currentPlayer]++;
                updateScoreboard();
                matchedCount += 2;
                
                // Marcarlas como encontradas
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                flippedCards = [];
                canClick = true;

                if (matchedCount === 54) {
                    const winner = scores[1] > scores[2] ? "Jugador 1" : (scores[2] > scores[1] ? "Jugador 2" : "Empate");
                    setTimeout(() => alert(`¡Juego Terminado! \nGanador: ${winner}`), 500);
                }
            } else {
                // Fallo: cambia de turno
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    switchTurn();
                    canClick = true;
                }, 1000);
            }
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            document.getElementById('p1-display').classList.toggle('active-player');
            document.getElementById('p2-display').classList.toggle('active-player');
        }

        function updateScoreboard() {
            document.getElementById('score1').innerText = scores[1];
            document.getElementById('score2').innerText = scores[2];
        }

        function resetGame() {
            // Reiniciar variables
            scores = { 1: 0, 2: 0 };
            matchedCount = 0;
            currentPlayer = 1;
            flippedCards = [];
            canClick = true;

            // Reiniciar UI
            updateScoreboard();
            document.getElementById('p1-display').classList.add('active-player');
            document.getElementById('p2-display').classList.remove('active-player');
            
            // Recrear tablero
            createBoard();
        }

        // Iniciar por primera vez
        createBoard();
    </script>
</body>
</html>
